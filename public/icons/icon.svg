<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#0f172a"/>

  <!-- Gradient background circle -->
  <circle cx="256" cy="256" r="200" fill="url(#gradient)"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Lightning bolt -->
  <path d="M280 80 L160 260 H240 L200 432 L352 210 H268 L312 80 Z"
        fill="#2dd4bf"
        stroke="#14b8a6"
        stroke-width="8"
        stroke-linejoin="round"/>

  <!-- Subtle glow effect -->
  <path d="M280 80 L160 260 H240 L200 432 L352 210 H268 L312 80 Z"
        fill="none"
        stroke="#5eead4"
        stroke-width="2"
        opacity="0.3"/>
</svg>